name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with coverage
      run: |
        python -m pytest -o "addopts=" \
          --cov=lib \
          --cov-report=term-missing \
          --cov-report=json:coverage.json

    - name: Extract coverage percentage
      id: coverage
      run: |
        echo "Parsing coverage from coverage.json..."
        COVERAGE=$(python scripts/ci/parse_coverage.py coverage.json)
        if [ -z "$COVERAGE" ]; then
          echo "ERROR: Failed to extract coverage percentage" >&2
          exit 1
        fi
        echo "Coverage: ${COVERAGE}%"
        echo "COVERAGE=${COVERAGE}" >> $GITHUB_ENV
        echo "percentage=${COVERAGE}" >> $GITHUB_OUTPUT

    - name: Update README badge
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      run: |
        echo "Updating README coverage badge to ${COVERAGE}%..."
        sed -i 's/coverage-[0-9][0-9.]*%25-/coverage-'"${COVERAGE}"'%25-/' README.md

    - name: Commit and push changes
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        if git diff --staged --quiet; then
          echo "No changes to commit - coverage percentage unchanged (${COVERAGE}%)"
        else
          git commit -m "ci: update coverage badge to ${COVERAGE}%"
          git push
          echo "README.md updated and pushed with coverage ${COVERAGE}%"
        fi
